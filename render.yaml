services:
  - type: web
    name: currencywise-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: currencywise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true    # Render generates a random secret key for you

databases:
  - name: currencywise-db
    plan: free
    databaseName: currencywise
    user: maudan